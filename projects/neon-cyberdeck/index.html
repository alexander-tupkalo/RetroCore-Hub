<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber-Deck // Card Battler</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Status & Counter Layouts */
        #player-status {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        #deck-counters {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 10px;
            padding-bottom: 10px;
        }
        .stat, .counter { font-size: 0.85rem; letter-spacing: 1px; }
        .stat { color: #39ff14; }
        .counter { color: #888; }

        /* HP Bars */
        .hp-bar-container {
            position: relative; width: 150px; height: 14px;
            background: #1a1a2e; border: 1px solid #333;
            border-radius: 2px; overflow: hidden;
        }
        .hp-bar { height: 100%; transition: width 0.3s ease; }
        #enemy-hp { background: #ff007f; box-shadow: 0 0 10px rgba(255, 0, 127, 0.4); }
        #player-hp { background: #39ff14; box-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }
        .hp-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.7rem; color: #fff; text-shadow: 1px 1px 2px #000; z-index: 2; font-weight: bold;
        }

        /* Enemy Area */
        #enemy-area { flex-direction: column; gap: 10px; }
        #enemy-intent { color: #ff007f; font-size: 0.9rem; text-shadow: 0 0 5px rgba(255, 0, 127, 0.5); }
        .cyber-avatar { font-size: 2.5rem; color: #fff; text-shadow: 0 0 15px #00f0ff; letter-spacing: 2px; }
        .prompt-text { color: #ff007f; text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; font-weight: bold; }

        /* END TURN BUTTON STYLE (НОВОЕ!) */
        #end-turn-btn {
            background: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            padding: 8px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            margin-left: auto; /* Прижмет кнопку к правому краю */
        }
        #end-turn-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            transform: scale(1.05);
        }
        #end-turn-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="battle-screen">
        <!-- TOP AREA: Enemy Info -->
        <div id="enemy-area">
            <div id="enemy-intent">🎯 Intent: Attack 10</div>
            <div class="cyber-avatar" id="enemy-sprite">🤖 Goblin</div>
            <div class="hp-bar-container">
                <div class="hp-bar" id="enemy-hp" style="width: 100%;"></div>
                <span class="hp-text" id="enemy-hp-text">50/50</span>
            </div>
        </div>

        <!-- MIDDLE AREA: Battle Grid -->
        <div id="drop-zone">
            <span class="prompt-text">// DROP CARD HERE TO EXECUTE //</span>
        </div>

        <!-- BOTTOM AREA: Player & Interface -->
        <div id="player-area">
            <div id="player-status">
                <div class="stat">⚡ Energy: <span id="energy-text">3/3</span></div>
                <div class="hp-bar-container">
                    <div class="hp-bar" id="player-hp" style="width: 100%;"></div>
                    <span class="hp-text" id="player-hp-text">80/80</span>
                </div>
                <div class="stat">🛡️ Shield: <span id="shield-text">0</span></div>
                
                <!-- НОВАЯ КНОПКА СЮДА -->
                <button id="end-turn-btn">End Turn</button>
            </div>

            <div id="player-hand">
                <!-- JS will render cards here -->
            </div>

            <div id="deck-counters">
                <div class="counter">📦 Deck: <span id="deck-count">0</span></div>
                <div class="counter">🗑️ Discard: <span id="discard-count">0</span></div>
            </div>
        </div>
    </div>

            <div id="game-over-overlay" class="hidden">
            <div id="end-screen-content">
                <h1 id="end-screen-title">YOU DIED</h1>
                <p id="end-screen-subtitle">System failure...</p>
                <button id="end-screen-btn">REBOOT SYSTEM</button>
            </div>
        </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
